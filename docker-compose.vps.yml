name: fj

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GAME_RELEASE_VERSION: ${GAME_RELEASE_VERSION:-}
        GITHUB_RUN_NUMBER: ${GITHUB_RUN_NUMBER:-}
        GITHUB_SHA: ${GITHUB_SHA:-}
        BUILD_NUMBER: ${BUILD_NUMBER:-}
        COMMIT_SHA: ${COMMIT_SHA:-}
        SOURCE_COMMIT: ${SOURCE_COMMIT:-}
        SOURCE_VERSION: ${SOURCE_VERSION:-}
    restart: unless-stopped
    env_file:
      - .env.vps
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:?set POSTGRES_DB}?schema=public
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/healthz | grep -q '\"status\":\"ok\"'"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?set POSTGRES_USER} -d ${POSTGRES_DB:?set POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    network_mode: host
    environment:
      APP_PUBLIC_HOST: ${APP_PUBLIC_HOST:?set APP_PUBLIC_HOST}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      app:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    profiles:
      - redis
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
  redis-data:
